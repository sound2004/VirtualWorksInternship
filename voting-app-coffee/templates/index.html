<!doctype html>
<html>
  <head>
    <title>Great Coffee Rating App</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h1>The Great Coffee Rating App</h1>

      {% for item in items %}
      <div class="card">
        <div>
          <h2>{{ item[1] }}</h2>
          <p>Votes: {{ item[2] }}</p>
        </div>
        <form action="/vote/{{ item[0] }}" method="POST">
          <button type="submit">+</button>
        </form>
      </div>
      {% endfor %}
    </div>
  </body>
</html>
